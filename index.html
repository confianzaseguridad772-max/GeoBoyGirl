<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoBoy - Registro Integral</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #4a90e2;
            --grad-active: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bg: #f4f7f9;
            --radius: 20px;
            --text: #2d3748;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            margin: 0; padding: 15px;
            display: flex; justify-content: center; min-height: 100vh;
        }

        .container {
            background: #fff; width: 100%; max-width: 480px;
            padding: 30px; border-radius: var(--radius);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        h1 {
            background: var(--grad-active);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center; margin: 0; font-size: 2.2em; font-weight: 600;
        }

        .status-box {
            padding: 15px; border-radius: 12px; font-size: 0.9em;
            text-align: center; margin: 20px 0; font-weight: 500;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.3s;
        }
        .waiting { background: #fff1f2; color: #991b1b; border: 1px solid #fecaca; }
        .ready { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }

        section { 
            margin-bottom: 30px; 
            padding: 15px;
            background: #ffffff;
            border-radius: 15px;
            border: 1px solid #f1f5f9;
        }
        
        h3 { 
            font-size: 1.1em; color: var(--text); 
            border-bottom: 2px solid #edf2f7; 
            padding-bottom: 10px; margin-bottom: 20px;
            display: flex; align-items: center; gap: 10px;
        }
        h3 i { color: #764ba2; }

        .field { margin-bottom: 18px; }
        label { display: block; font-size: 0.85em; font-weight: 600; color: #4a5568; margin-bottom: 6px; }
        
        input, select {
            width: 100%; padding: 12px 15px; border: 2px solid #e2e8f0;
            border-radius: 12px; box-sizing: border-box; font-size: 1em;
            transition: 0.3s; background: #fcfdfe;
        }

        input:focus, select:focus {
            outline: none; border-color: #764ba2; box-shadow: 0 0 0 4px rgba(118, 75, 162, 0.1);
        }

        .checkbox-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            background: #f8fafc; padding: 15px; border-radius: 12px;
        }
        .checkbox-item {
            display: flex; align-items: center; gap: 8px; font-size: 0.9em;
            cursor: pointer; padding: 5px;
        }
        .checkbox-item input { width: 18px; height: 18px; accent-color: #764ba2; }

        .entry-group {
            background: #f8fafc; padding: 15px; border-radius: 12px;
            border: 1px solid #e2e8f0; border-left: 5px solid #764ba2;
            margin-bottom: 15px; animation: fadeIn 0.4s ease;
            position: relative;
        }

        .btn-add {
            background: #fff; color: #764ba2; border: 2px solid #764ba2;
            padding: 10px 20px; border-radius: 25px; cursor: pointer;
            font-weight: 600; font-size: 0.85em; margin: 10px auto; display: block;
            transition: 0.3s;
        }
        .btn-add:hover { background: #f3f0ff; }

        #submitBtn {
            width: 100%; padding: 18px; background: var(--grad-active);
            color: white; border: none; border-radius: 15px;
            font-size: 1.1em; font-weight: 600; cursor: pointer;
            display: none; 
            box-shadow: 0 10px 20px rgba(118, 75, 162, 0.3);
            transition: 0.3s;
        }
        #submitBtn:hover { transform: translateY(-2px); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>GeoBoy</h1>
        <div id="geoStatus" class="status-box waiting">
            <i class="fas fa-satellite-dish fa-spin"></i>
            <span id="geoText">Buscando ubicación GPS...</span>
        </div>
    </header>

    <form id="mainForm">
        <!-- SECCIÓN 1: DATOS DE LA MADRE -->
        <section>
            <h3><i class="fas fa-id-card"></i> Datos de la Madre</h3>
            <div class="field">
                <label>N° DNI Madre (8 dígitos):</label>
                <input type="text" name="dni_madre" pattern="\d{8}" maxlength="8" placeholder="Ej. 12345678" required>
            </div>
            <div class="field">
                <label>Nombre Completo:</label>
                <input type="text" name="nombre_madre" placeholder="Nombres y Apellidos" required>
            </div>
            <div class="field">
                <label>Estado Civil:</label>
                <select name="estado_civil" required>
                    <option value="" disabled selected>Seleccione...</option>
                    <option value="Soltera">Soltera</option>
                    <option value="Conviviente">Conviviente</option>
                    <option value="Casada">Casada</option>
                    <option value="Divorciada">Divorciada</option>
                </select>
            </div>
            <div class="field">
                <label>Celular:</label>
                <input type="tel" name="celular" placeholder="999888777" required>
            </div>
            <div class="field">
                <label>Domicilio:</label>
                <input type="text" name="domicilio" placeholder="Dirección exacta" required>
            </div>
            <div class="field">
                <label>Tipo de Vivienda:</label>
                <select name="tipo_vivienda" required>
                    <option value="" disabled selected>Seleccione...</option>
                    <option value="Propia">Propia</option>
                    <option value="Alquilada">Alquilada</option>
                    <option value="Casa propia de padres u otro familiar">Casa propia de padres u otro familiar</option>
                </select>
            </div>
        </section>

        <!-- SECCIÓN 2: DATOS DE LOS HIJOS (DINÁMICO) -->
        <section>
            <h3><i class="fas fa-baby"></i> Datos de los Hijos</h3>
            <div id="lista-hijos"></div>
            <button type="button" class="btn-add" onclick="agregarHijo()">
                <i class="fas fa-plus"></i> Añadir Hijo
            </button>
        </section>

        <!-- SECCIÓN 3: CUIDADORES -->
        <section>
            <h3><i class="fas fa-house-user"></i> ¿Quiénes viven con el menor?</h3>
            <div class="checkbox-grid">
                <label class="checkbox-item"><input type="checkbox" name="cuidadores[]" value="Madre"> Mamá</label>
                <label class="checkbox-item"><input type="checkbox" name="cuidadores[]" value="Padre"> Papá</label>
                <label class="checkbox-item"><input type="checkbox" name="cuidadores[]" value="Abuelos"> Abuelos</label>
                <label class="checkbox-item"><input type="checkbox" name="cuidadores[]" value="Tios"> Tíos</label>
                <label class="checkbox-item"><input type="checkbox" name="cuidadores[]" value="Primos"> Primos</label>
                <label class="checkbox-item"><input type="checkbox" name="cuidadores[]" value="Hermanos"> Hermanos</label>
            </div>
        </section>

        <input type="hidden" name="georeferencia" id="georeferencia">
        <button type="submit" id="submitBtn">
            <i class="fas fa-save"></i> Finalizar Registro
        </button>
    </form>
</div>

<script>
    // 1. MANEJO DE GPS (No permite enviar hasta tener ubicación)
    window.onload = function() {
        const geoStatus = document.getElementById('geoStatus');
        const btn = document.getElementById('submitBtn');
        const geoInput = document.getElementById('georeferencia');

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    geoInput.value = pos.coords.latitude + ", " + pos.coords.longitude;
                    geoStatus.className = "status-box ready";
                    geoStatus.innerHTML = '<i class="fas fa-check-circle"></i> <span>Ubicación capturada</span>';
                    btn.style.display = "block"; 
                },
                (err) => {
                    Swal.fire('Error GPS', 'Activa el GPS y recarga la página.', 'warning');
                },
                { enableHighAccuracy: true, timeout: 15000 }
            );
        }
    };

    // 2. LÓGICA DE AGREGAR HIJOS
    function agregarHijo() {
        const div = document.createElement('div');
        div.className = 'entry-group';
        div.innerHTML = `
            <div class="field">
                <label>DNI del Hijo (8 dígitos):</label>
                <input type="text" name="hijo_dni[]" pattern="\\d{8}" maxlength="8" placeholder="Ej. 77665544" required>
            </div>
            <div class="field">
                <label>Nombre Completo:</label>
                <input type="text" name="hijo_nombre[]" required>
            </div>
            <div class="field">
                <label>Fecha de Nacimiento (DD/MM/AAAA):</label>
                <input type="text" 
                       name="hijo_fecha[]" 
                       placeholder="DD/MM/AAAA" 
                       maxlength="10"
                       pattern="^([0-2][0-9]|3[0-1])/(0[1-9]|1[0-2])/([0-9]{4})$"
                       oninput="mascaraFecha(this)"
                       inputmode="numeric"
                       required>
            </div>
            <i class="fas fa-trash-alt" style="position:absolute; top:15px; right:15px; color:#e74c3c; cursor:pointer;" onclick="this.parentElement.remove()"></i>
        `;
        document.getElementById('lista-hijos').appendChild(div);
    }

    // Máscara inteligente para la fecha (Pone las "/" solo)
    function mascaraFecha(input) {
        let v = input.value.replace(/\D/g, '').slice(0, 8);
        if (v.length >= 5) {
            input.value = v.slice(0, 2) + '/' + v.slice(2, 4) + '/' + v.slice(4);
        } else if (v.length >= 3) {
            input.value = v.slice(0, 2) + '/' + v.slice(2);
        } else {
            input.value = v;
        }
    }

    // 3. ENVÍO DE DATOS
    document.getElementById('mainForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        // Validar que al menos un cuidador esté seleccionado
        const cuidadores = document.querySelectorAll('input[name="cuidadores[]"]:checked');
        if (cuidadores.length === 0) {
            Swal.fire('Atención', 'Selecciona quiénes viven con el menor.', 'warning');
            return;
        }

        // Validar que haya al menos un hijo
        const hijos = document.querySelectorAll('input[name="hijo_dni[]"]');
        if (hijos.length === 0) {
            Swal.fire('Atención', 'Debes añadir al menos un hijo.', 'warning');
            return;
        }

        Swal.fire({
            title: 'Guardando...',
            text: 'Enviando datos a la base de datos',
            allowOutsideClick: false,
            didOpen: () => { Swal.showLoading(); }
        });

        const formData = new FormData(this);
        const data = {};
        
        for (let [key, value] of formData.entries()) {
            if (key.endsWith('[]')) {
                if (!data[key]) data[key] = [];
                data[key].push(value);
            } else {
                data[key] = value;
            }
        }

        // REEMPLAZAR ESTA URL POR LA DE TU SCRIPT DESPLEGADO
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbyAtNLECHMuB7R-6jomnE89ZiiBcsf8PYFTm-71Y4ebjzMxz60kXxgVDHznpQn7WEe9/exec"; 

        fetch(URL_SCRIPT, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(data)
        }).then(() => {
            Swal.fire({
                icon: 'success',
                title: 'Registrado',
                text: 'Los datos se guardaron correctamente.',
                confirmButtonColor: '#764ba2'
            }).then(() => location.reload());
        }).catch(() => {
            Swal.fire('Error', 'No se pudo conectar con el servidor.', 'error');
        });
    });
</script>

</body>
</html>
