<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Madres y Niños</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Formulario de Registro</h2>
        <form id="mainForm">
            <section>
                <h3>Datos de la Madre</h3>
                <label>Nombre de la Madre:</label>
                <input type="text" name="nombre_madre" required>
                
                <label>Estado Civil:</label>
                <select name="estado_civil">
                    <option value="Soltero">Soltero/a</option>
                    <option value="Conviviente">Conviviente</option>
                    <option value="Casado">Casado/a</option>
                    <option value="Divorciado">Divorciado/a</option>
                </select>

                <label>Domicilio:</label>
                <input type="text" name="domicilio" required>
            </section>

            <section id="hijos-section">
                <h3>Datos de los Hijos (< 5 años)</h3>
                <div id="lista-hijos"></div>
                <button type="button" class="btn-add" onclick="agregarHijo()">+ Agregar Hijo</button>
            </section>

            <section>
                <h3>Cuidadores</h3>
                <div id="lista-cuidadores"></div>
                <button type="button" class="btn-add" onclick="agregarCuidador()">+ Agregar Cuidador</button>
            </section>

            <input type="hidden" name="georeferencia" id="georeferencia">
            
            <button type="submit" id="submitBtn">Enviar Información</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
