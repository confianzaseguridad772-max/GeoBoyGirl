<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoBoy - Registro</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #4a90e2;
            --grad-active: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bg: #f0f4f8;
            --radius: 16px;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            margin: 0; padding: 10px;
            display: flex; justify-content: center; min-height: 100vh;
        }

        .container {
            background: #fff; width: 100%; max-width: 450px;
            padding: 30px; border-radius: var(--radius);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        h1 {
            background: var(--grad-active);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center; margin: 0;
        }

        .status-box {
            padding: 12px; border-radius: 12px; font-size: 0.85em;
            text-align: center; margin: 15px 0; font-weight: 500;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .waiting { background: #fee2e2; color: #991b1b; }
        .ready { background: #dcfce7; color: #166534; }

        section { margin-bottom: 25px; }
        h3 { font-size: 1.1em; color: #334155; border-left: 4px solid var(--primary); padding-left: 10px; }

        .field { margin-bottom: 15px; }
        label { display: block; font-size: 0.8em; font-weight: 600; color: #64748b; margin-bottom: 5px; }
        
        input, select {
            width: 100%; padding: 12px; border: 2px solid #e2e8f0;
            border-radius: 10px; box-sizing: border-box; font-size: 1em;
        }

        .entry-group {
            background: #f8fafc; padding: 15px; border-radius: 10px;
            border: 1px solid #e2e8f0; margin-bottom: 10px;
        }

        .btn-add {
            background: #fff; color: #764ba2; border: 2px solid #e2e8f0;
            padding: 8px 15px; border-radius: 20px; cursor: pointer;
            font-weight: 600; font-size: 0.8em; margin: 10px auto; display: block;
        }

        #submitBtn {
            width: 100%; padding: 18px; background: var(--grad-active);
            color: white; border: none; border-radius: var(--radius);
            font-size: 1.1em; font-weight: 600; cursor: pointer;
            display: none; /* Oculto hasta que GPS funcione */
            box-shadow: 0 8px 20px rgba(118, 75, 162, 0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>GeoBoy</h1>
        <div id="geoStatus" class="status-box waiting">
            <i class="fas fa-satellite-dish fa-spin"></i>
            <span id="geoText">Buscando ubicación GPS...</span>
        </div>
    </header>

    <form id="mainForm">
        <section>
            <h3><i class="fas fa-female"></i> Datos de la Madre</h3>
            <div class="field">
                <label>N° DNI de la Madre:</label>
                <input type="number" name="dni_madre" required>
            </div>
            <div class="field">
                <label>Nombre Completo:</label>
                <input type="text" name="nombre_madre" required>
            </div>
            <div class="field">
                <label>Estado Civil:</label>
                <select name="estado_civil" required>
                    <option value="" disabled selected>Seleccione...</option>
                    <option value="Soltera">Soltera</option>
                    <option value="Conviviente">Conviviente</option>
                    <option value="Casada">Casada</option>
                </select>
            </div>
            <div class="field">
                <label>Celular:</label>
                <input type="tel" name="celular" required>
            </div>
            <div class="field">
                <label>Domicilio:</label>
                <input type="text" name="domicilio" required>
            </div>
        </section>

        <section>
            <h3><i class="fas fa-baby"></i> Datos de los Hijos</h3>
            <div id="lista-hijos"></div>
            <button type="button" class="btn-add" onclick="agregarHijo()">+ Añadir Hijo</button>
        </section>

        <section>
            <h3><i class="fas fa-hands-helping"></i> Cuidadores</h3>
            <div id="lista-cuidadores"></div>
            <button type="button" class="btn-add" onclick="agregarCuidador()">+ Añadir Cuidador</button>
        </section>

        <input type="hidden" name="georeferencia" id="georeferencia">
        <button type="submit" id="submitBtn">Registrar Información</button>
    </form>
</div>

<script>
    // FORZAR GPS AL CARGAR
    window.onload = function() {
        const geoStatus = document.getElementById('geoStatus');
        const geoText = document.getElementById('geoText');
        const btn = document.getElementById('submitBtn');
        const geoInput = document.getElementById('georeferencia');

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    geoInput.value = lat + ", " + lon;
                    
                    geoStatus.className = "status-box ready";
                    geoText.innerText = "📍 Ubicación detectada";
                    btn.style.display = "block"; // Mostrar botón
                },
                (err) => {
                    geoText.innerText = "⚠️ Error: Active su GPS y refresque";
                    alert("Por favor active la ubicación en su celular.");
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }
    };

    function agregarHijo() {
        const div = document.createElement('div');
        div.className = 'entry-group';
        div.innerHTML = `
            <label>DNI Hijo:</label><input type="number" name="hijo_dni[]" required>
            <label>Nombre:</label><input type="text" name="hijo_nombre[]" required>
            <label>Nacimiento:</label><input type="date" name="hijo_fecha[]" required>
        `;
        document.getElementById('lista-hijos').appendChild(div);
    }

    function agregarCuidador() {
        const div = document.createElement('div');
        div.className = 'entry-group';
        div.innerHTML = `
            <label>Parentesco:</label>
            <select name="cuidadores[]" required>
                <option value="Madre">Madre</option>
                <option value="Padre">Padre</option>
                <option value="Abuelos">Abuelos</option>
                <option value="Tios">Tíos</option>
                <option value="Hermanos">Hermanos</option>
            </select>
        `;
        document.getElementById('lista-cuidadores').appendChild(div);
    }

    document.getElementById('mainForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "Enviando...";

        const formData = new FormData(this);
        const data = {};
        formData.forEach((value, key) => {
            if (key.includes('[]')) {
                if (!data[key]) data[key] = [];
                data[key].push(value);
            } else {
                data[key] = value;
            }
        });

        // REEMPLAZA ESTA URL CON TU WEB APP DE GOOGLE
        const URL = "https://script.google.com/macros/s/AKfycbyFBJeSC-FduYSBNY2zcdgEOOv7erSU1w0ENotDp_r1D77DjVdzhdJyQOQX7uHOESAE/exec";

        fetch(URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(data)
        }).then(() => {
            alert("¡Guardado correctamente!");
            location.reload();
        }).catch(() => alert("Error al conectar con Excel"));
    });
</script>

</body>
</html>
